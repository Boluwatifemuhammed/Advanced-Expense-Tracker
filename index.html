<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Expense Tracker</title>
</head>
<body>
    <div class="cont">
        <h1>Expense Tracker</h1>

        <div class="balance-cont">
            <h2>Your Balance</h2>
            <h1 id="balance">$2,456.00</h1>
            <div class="summary">
                <div class="income-cont">
                    <h3>Income</h3>
                    <p id="income-amount">$40.00</p>
                </div>
                <div class="expense-cont">
                    <h3>Expenses</h3>
                    <p id="expense-amount">$40.00</p>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="transaction-cont">
                <h2>Transactions</h2>
                <ul id="transaction-list">

                </ul>
            </div>
            
            <div class="form-cont">
                <h2>Add Transaction</h2>
                
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="Enter description...." required/>
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" placeholder="Enter amount...." required/>
                        <small>Use negative (-) for expenses</small>
                    </div>

                    <button type="submit" id="submit-btn">Add Transaction</button>

                </form>
            </div>
        </div>



    </div>    
    <script src="app.js"></script>
</body>
</html>
